<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☕ Daddy'Pay — La solution caisse de Chez Daddy</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ── SUPABASE ── */
    const SUPA_URL = "https://hhxuumexyvoxomoarmul.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoeHV1bWV4eXZveG9tb2FybXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjEzNTIsImV4cCI6MjA5MDU5NzM1Mn0.ifBaeLJVr1e9qJonZdGB9XqaWXXYrn5vJUrvw72NRqw";
    const SUPA_TIMEOUT = 8000; // 8s max par requête

    const supaFetch = async (path, opts={}) => {
      const controller = new AbortController();
      const timer = setTimeout(()=>controller.abort(), SUPA_TIMEOUT);
      try {
        const r = await fetch(SUPA_URL + path, {
          ...opts,
          signal: controller.signal,
          headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY,
            "Content-Type": "application/json", "Prefer": "return=representation",
            ...(opts.headers||{}) }
        });
        clearTimeout(timer);
        if (!r.ok) { const t = await r.text(); console.error("Supabase error", r.status, t); return null; }
        // 204 No Content (succès sans body)
        if (r.status === 204) return true;
        return r.json();
      } catch(e) {
        clearTimeout(timer);
        console.error("supaFetch error:", e.message);
        return null;
      }
    };

    /* File d'attente pour les sauvegardes ratées — retry en arrière-plan */
    const _saveQueue = [];
    let _saveRunning = false;
    const _flushQueue = async () => {
      if (_saveRunning || _saveQueue.length===0) return;
      _saveRunning = true;
      while (_saveQueue.length > 0) {
        const {cafe, section, data, resolve} = _saveQueue[0];
        const res = await supaFetch("/rest/v1/daddy_data", {
          method: "POST",
          headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
          body: JSON.stringify({ cafe, section, data, updated_at: new Date().toISOString() })
        });
        if (res !== null) {
          _saveQueue.shift();
          resolve(true);
        } else {
          // Réessayer dans 5s
          await new Promise(r=>setTimeout(r,5000));
        }
      }
      _saveRunning = false;
    };

    /* ── AUTH ── */
    const b64e = (s) => btoa(unescape(encodeURIComponent(s)));
    const b64d = (s) => { try { return decodeURIComponent(escape(atob(s))); } catch { return ""; } };

    const DEFAULT_USERS = [
      { login: "Finance",    pwd: b64e("Henon63122!"), role: "admin",      cafe: null },
      { login: "Operations", pwd: b64e("Henon69004!"), role: "operations", cafe: null },
      { login: "CafeCRX",   pwd: b64e("Henon69004!"), role: "cafe",        cafe: "Croix-Rousse" },
      { login: "CafeCLR",  pwd: b64e("Henon69004!"), role: "cafe",  cafe: "Caluire" },
      { login: "CafeAUT",  pwd: b64e("Henon69004!"), role: "cafe",  cafe: "Autun" },
      { login: "CafeLMD",  pwd: b64e("Henon69004!"), role: "cafe",  cafe: "La Madeleine" },
      { login: "CafeDOU",  pwd: b64e("Henon69004!"), role: "cafe",  cafe: "Douai" },
      { login: "CafeCFD",  pwd: b64e("Henon69004!"), role: "cafe",  cafe: "Clermont-Ferrand" },
      { login: "CafeSFL",  pwd: b64e("Henon69004!"), role: "cafe",  cafe: "Ste Foy lès Lyon" },
    ];
    const USERS_KEY   = "daddy_auth_users";
    const SESSION_KEY = "daddy_session";
    const CAFES_KEY   = "daddy_cafes_list";
    const INITIAL_CAFES = ["Autun","Croix-Rousse","La Madeleine","Caluire","Ste Foy lès Lyon","Douai","Clermont-Ferrand"];

    const loadUsers    = () => { try { const r = localStorage.getItem(USERS_KEY);   return r ? JSON.parse(r) : DEFAULT_USERS; } catch { return DEFAULT_USERS; } };
    const saveUsers    = (u) => { try { localStorage.setItem(USERS_KEY, JSON.stringify(u)); } catch {} };
    const loadSession  = () => { try { const r = sessionStorage.getItem(SESSION_KEY); return r ? JSON.parse(r) : null; } catch { return null; } };
    const saveSession  = (s) => { try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(s)); } catch {} };
    const clearSession = () => { try { sessionStorage.removeItem(SESSION_KEY); } catch {} };
    const loadCafesList = () => { try { const r = localStorage.getItem(CAFES_KEY); return r ? JSON.parse(r) : INITIAL_CAFES; } catch { return INITIAL_CAFES; } };
    const saveCafesList = (l) => { try { localStorage.setItem(CAFES_KEY, JSON.stringify(l)); } catch {} };

    /* ── RESTAURATION COLLECTIVE — activation par café ── */
    // RC activé via Supabase (partagé entre tous les PC)
    const loadRCEnabled = async () => {
      try {
        const rows = await supaFetch("/rest/v1/daddy_data?cafe=eq._config&section=eq.rc_enabled&select=data");
        if (rows && rows[0]) return rows[0].data || {};
      } catch {}
      // fallback localStorage
      try { const r=localStorage.getItem("daddy_rc_enabled"); if(r) return JSON.parse(r); } catch {}
      return {};
    };
    const saveRCEnabled = async (o) => {
      try { localStorage.setItem("daddy_rc_enabled", JSON.stringify(o)); } catch {}
      await supaFetch("/rest/v1/daddy_data", {
        method: "POST",
        headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify({ cafe: "_config", section: "rc_enabled", data: o, updated_at: new Date().toISOString() })
      });
    };
    const TVA_RATES = { Snacking: 0.10, Soft: 0.20, Alcool: 0.20 };

    /* ── EMAILJS CONFIG ── (à renseigner dans le panneau Admin) */
    const EMAILJS_KEY   = "daddy_emailjs";
    const REPORT_KEY    = "daddy_last_reports"; // { lastWeekly: "YYYY-MM-DD", lastMonthly: "YYYY-MM" }
    const DEST_EMAIL    = "finance@groupedaddy.fr";

    const loadEmailJSConfig = () => { try { const r=localStorage.getItem(EMAILJS_KEY); return r?JSON.parse(r):{serviceId:"service_fg3j3xy",templateId:"template_t0z4q8u",publicKey:"XyVLFvukF6XVyk2ny"}; } catch { return {serviceId:"service_fg3j3xy",templateId:"template_t0z4q8u",publicKey:"XyVLFvukF6XVyk2ny"}; } };
    const saveEmailJSConfig = (c) => { try { localStorage.setItem(EMAILJS_KEY, JSON.stringify(c)); } catch {} };
    const loadLastReports   = () => { try { const r=localStorage.getItem(REPORT_KEY); return r?JSON.parse(r):{lastWeekly:null,lastMonthly:null}; } catch { return {lastWeekly:null,lastMonthly:null}; } };
    const saveLastReports   = (r) => { try { localStorage.setItem(REPORT_KEY, JSON.stringify(r)); } catch {} };

    /* ── HELPERS DATE / TRIM ── */
    const getStartOfCurrentQuarter = () => {
      const now = new Date(); const m = now.getMonth(); const y = now.getFullYear();
      const qStart = Math.floor(m/3)*3;
      return new Date(y, qStart, 1);
    };
    const getPreviousMonday = (d=new Date()) => {
      const day = d.getDay(); // 0=dim
      const diff = day===0 ? 6 : day-1;
      const mon = new Date(d); mon.setDate(d.getDate()-diff); mon.setHours(0,0,0,0); return mon;
    };
    const getLastSunday = (d=new Date()) => {
      const mon = getPreviousMonday(d);
      const sun = new Date(mon); sun.setDate(mon.getDate()-1); return sun;
    };

    /* ── BUILD CSV STRING (sans téléchargement) ── */
    const CSV_COL_ORDER = [
      "TVA","Café","Section",
      "date","semaine","mois",
      "produit","evenement","fournisseur","client",
      "typo","type","destination",
      "qte","prix_unitaire","pu",
      "montant","prix_total","montant_facture","montant_devis",
      "tva_rate","tva_unitaire","tva_total","ht_unitaire","ht_total",
      "mode","recu_fiscal","facture_teams","devis_accepte",
      "no_facture","date_evenement","date_reglement","commentaire","id"
    ];
    const sortedHeaders = (rows) => {
      const allKeys = [...new Set(rows.flatMap(r=>Object.keys(r)))];
      const ordered = CSV_COL_ORDER.filter(k=>allKeys.includes(k));
      const rest = allKeys.filter(k=>!CSV_COL_ORDER.includes(k));
      return [...ordered, ...rest];
    };
    const buildCSVString = (rows) => {
      if (!rows.length) return "";
      const headers = sortedHeaders(rows);
      const escape = (v) => { const s=(v===null||v===undefined)?"":String(v).replace(/[\r\n]+/g," "); return s.includes(";")||s.includes('"')?`"${s.replace(/"/g,'""')}"`  :s; };
      return [headers.map(escape).join(";"), ...rows.map(r=>headers.map(h=>escape(r[h])).join(";"))].join("\n");
    };

    /* ── COLLECT ALL DATA ── */
    const collectAllData = async (cafes, filterFn) => {
      const rows = [];
      await Promise.all(cafes.map(async cafe => {
        const [ct,tc,dn,ac,pv,adh,rc] = await Promise.all(["caisseta","tcam","dons","achats","privatisation","adhesion","restocollective"].map(s=>loadData(cafe,s)));
        const all = [{s:"caisseta",d:ct},{s:"tcam",d:tc},{s:"dons",d:dn},{s:"achats",d:ac},{s:"privatisation",d:pv}];
        all.forEach(({s,d})=>d.filter(filterFn).forEach(r=>rows.push({Café:cafe,Section:s.toUpperCase(),TVA:"",...r})));
        explodeAdhesion(adh.filter(filterFn), cafe).forEach(r=>rows.push({...r,TVA:""}));
        rc.filter(filterFn).forEach(r=>rows.push({Café:cafe,Section:"RESTOCOLLECTIVE",TVA:r.tva_total?.toFixed(2)||"",...r}));
      }));
      return rows;
    };

    /* ── SEND EMAIL via EmailJS ── */
    const sendEmailReport = async (subject, summaryText, config) => {
      if (!config.serviceId||!config.templateId||!config.publicKey) throw new Error("EmailJS non configuré");
      emailjs.init(config.publicKey);
      await emailjs.send(config.serviceId, config.templateId, {
        to_email:    DEST_EMAIL,
        subject:     subject,
        message:     summaryText,
        csv_content: "",
      });
    };

    /* ── BUILD SUMMARY TEXT for email ── */
    const buildSummaryText = (rows, cafes, periodLabel) => {
      const sum = (arr, k) => arr.reduce((s,r)=>s+(parseFloat(r[k])||0),0);
      let txt = `☕ Chez Daddy — Rapport ${periodLabel}\n`;
      txt += `Généré le ${new Date().toLocaleDateString("fr-FR")} à ${new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}\n`;
      txt += `Total lignes : ${rows.length}\n\n`;
      txt += `${"─".repeat(40)}\nDÉTAIL PAR CAFÉ\n${"─".repeat(40)}\n`;
      cafes.forEach(cafe => {
        const cr = rows.filter(r=>r.Café===cafe);
        if (!cr.length) return;
        const ta   = sum(cr.filter(r=>r.Section==="CAISSETA"), "prix_total");
        const tc   = sum(cr.filter(r=>r.Section==="TCAM"),     "montant");
        const dn   = sum(cr.filter(r=>r.Section==="DONS"),     "montant");
        const ac   = sum(cr.filter(r=>r.Section==="ACHATS"),   "montant");
        const pv   = sum(cr.filter(r=>r.Section==="PRIVATISATION"), "montant_facture");
        const tot  = ta+tc+dn+pv;
        txt += `\n${cafe}\n`;
        txt += `  TA         : ${ta.toFixed(2)} €\n`;
        txt += `  TCAM       : ${tc.toFixed(2)} €\n`;
        txt += `  Dons       : ${dn.toFixed(2)} €\n`;
        txt += `  Achats     : -${ac.toFixed(2)} €\n`;
        txt += `  Privat.    : ${pv.toFixed(2)} €\n`;
        txt += `  ► TOTAL    : ${tot.toFixed(2)} €\n`;
      });
      const gTA  = sum(rows.filter(r=>r.Section==="CAISSETA"), "prix_total");
      const gTC  = sum(rows.filter(r=>r.Section==="TCAM"),     "montant");
      const gDN  = sum(rows.filter(r=>r.Section==="DONS"),     "montant");
      const gAC  = sum(rows.filter(r=>r.Section==="ACHATS"),   "montant");
      const gPV  = sum(rows.filter(r=>r.Section==="PRIVATISATION"), "montant_facture");
      txt += `\n${"─".repeat(40)}\nTOTAL TOUS CAFÉS\n${"─".repeat(40)}\n`;
      txt += `  TA         : ${gTA.toFixed(2)} €\n`;
      txt += `  TCAM       : ${gTC.toFixed(2)} €\n`;
      txt += `  Dons       : ${gDN.toFixed(2)} €\n`;
      txt += `  Achats     : -${gAC.toFixed(2)} €\n`;
      txt += `  Privat.    : ${gPV.toFixed(2)} €\n`;
      txt += `  ► ENCAISSÉ : ${(gTA+gTC+gDN+gPV).toFixed(2)} €\n`;
      txt += `\nLe fichier CSV complet a été téléchargé automatiquement sur le poste de l'administrateur.`;
      return txt;
    };

    /* ── AUTO-REPORT CHECKER (appelé au login admin) ── */
    const checkAndSendAutoReports = async (cafes) => {
      const config = loadEmailJSConfig();
      if (!config.serviceId||!config.templateId||!config.publicKey) return;
      const reports = loadLastReports();
      const today   = new Date(); today.setHours(0,0,0,0);

      // ── RAPPORT CSV DIMANCHE : semaine en cours (lun→dim), tous cafés ──
      if (today.getDay()===0) { // dimanche
        const mon = getPreviousMonday(today);
        const weekLabel = `${mon.toISOString().slice(0,10)}_${today.toISOString().slice(0,10)}`;
        const sundayKey = "lastSunday";
        if (reports[sundayKey] !== weekLabel) {
          try {
            const rows = await collectAllData(cafes, r => {
              if (!r.date) return false;
              const d = new Date(r.date); d.setHours(0,0,0,0);
              return d >= mon && d <= today;
            });
            const csv = buildCSVString(rows);
            const subject = `☕ Chez Daddy — CSV complet semaine du ${mon.toLocaleDateString("fr-FR")} au ${today.toLocaleDateString("fr-FR")}`;
            const summaryText = rows.length
              ? buildSummaryText(rows, cafes, `semaine du ${mon.toLocaleDateString("fr-FR")} au ${today.toLocaleDateString("fr-FR")}`)
                + `

${"─".repeat(40)}
FICHIER CSV JOINT
${"─".repeat(40)}
${csv.slice(0,8000)}${csv.length>8000?"…(tronqué)":""}`
              : "(aucune donnée cette semaine)";
            await sendEmailReport(subject, summaryText, config);
            saveLastReports({...reports, [sundayKey]: weekLabel});
          } catch(e) { console.warn("Erreur envoi dimanche:", e); }
        }
      }

      // ── RAPPORT HEBDO : chaque lundi, rapport de la semaine précédente (lun-dim) ──
      if (today.getDay()===1) { // lundi
        const lastSun = getLastSunday(today);
        const lastMon = getPreviousMonday(lastSun);
        const weekLabel = `${lastMon.toISOString().slice(0,10)}_${lastSun.toISOString().slice(0,10)}`;
        if (reports.lastWeekly !== weekLabel) {
          try {
            const rows = await collectAllData(cafes, r => {
              if (!r.date) return false;
              const d = new Date(r.date); d.setHours(0,0,0,0);
              return d >= lastMon && d <= lastSun;
            });
            const csv = buildCSVString(rows);
            const subject = `☕ Chez Daddy — Rapport hebdo semaine du ${lastMon.toLocaleDateString("fr-FR")} au ${lastSun.toLocaleDateString("fr-FR")}`;
            const summaryText = rows.length ? buildSummaryText(rows, cafes, `hebdo du ${lastMon.toLocaleDateString("fr-FR")} au ${lastSun.toLocaleDateString("fr-FR")}`) : "(aucune donnée cette semaine)";
            if (rows.length) buildAndDownloadCSV(rows, `DaddyCafe_Hebdo_${weekLabel}.csv`);
            await sendEmailReport(subject, summaryText, config);
            saveLastReports({...reports, lastWeekly: weekLabel});
          } catch(e) { console.warn("Erreur envoi hebdo:", e); }
        }
      }

      // ── RAPPORT MENSUEL : chaque 1er du mois, rapport du mois précédent ──
      if (today.getDate()===1) {
        const prevMonth = today.getMonth()===0 ? 12 : today.getMonth();
        const prevYear  = today.getMonth()===0 ? today.getFullYear()-1 : today.getFullYear();
        const monthLabel = `${prevYear}-${String(prevMonth).padStart(2,"0")}`;
        if (reports.lastMonthly !== monthLabel) {
          try {
            const rows = await collectAllData(cafes, r => {
              if (!r.date) return false;
              const d = new Date(r.date);
              return d.getMonth()+1===prevMonth && d.getFullYear()===prevYear;
            });
            const csv = buildCSVString(rows);
            const mName = MONTHS[prevMonth-1];
            const subject2 = `☕ Chez Daddy — Rapport mensuel ${mName} ${prevYear}`;
            const summaryText2 = rows.length ? buildSummaryText(rows, cafes, `mensuel ${mName} ${prevYear}`) : `(aucune donnée pour ${mName} ${prevYear})`;
            if (rows.length) buildAndDownloadCSV(rows, `DaddyCafe_Mensuel_${monthLabel}.csv`);
            await sendEmailReport(subject2, summaryText2, config);
            saveLastReports({...reports, lastMonthly: monthLabel});
          } catch(e) { console.warn("Erreur envoi mensuel:", e); }
        }
      }
    };

    /* ── STORAGE HELPERS ── */
    const WEEKS_2026 = (() => {
      const weeks = []; let d = new Date("2025-12-29");
      for (let i = 1; i <= 53; i++) {
        const end = new Date(d); end.setDate(end.getDate() + 6);
        weeks.push({ label: `S${i}`, start: new Date(d), end });
        d.setDate(d.getDate() + 7);
      }
      return weeks;
    })();
    const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

    /* Semaine courante par défaut */
    const getCurrentWeekLabel = () => {
      const today = new Date(); today.setHours(0,0,0,0);
      for (const w of WEEKS_2026) { if (today >= w.start && today <= w.end) return w.label; }
      return WEEKS_2026[0]?.label || "S1";
    };
    const getWeekForDate  = (s) => { if (!s) return ""; const d = new Date(s); for (const w of WEEKS_2026) { if (d >= w.start && d <= w.end) return w.label; } return ""; };
    const getMonthForDate = (s) => { if (!s) return null; return new Date(s).getMonth() + 1; };
    /* ── Supabase direct — pas de cache mémoire (évite les données périmées) ── */
    const _lsKey = (cafe, section) => `daddy_fb_${cafe}_${section}`;

    /* ── Test connexion Supabase au démarrage ── */
    const SUPA_STATUS_KEY = "daddy_supa_ok";
    let _supaOk = null; // null=inconnu, true=ok, false=KO

    const testSupabase = async () => {
      try {
        const r = await supaFetch("/rest/v1/daddy_data?limit=1&select=cafe");
        if (r !== null) {
          _supaOk = true;
          try { localStorage.setItem(SUPA_STATUS_KEY, "ok"); } catch {}
          window.dispatchEvent(new CustomEvent("supa_status", { detail: { ok: true } }));
        } else {
          _supaOk = false;
          try { localStorage.setItem(SUPA_STATUS_KEY, "ko"); } catch {}
          window.dispatchEvent(new CustomEvent("supa_status", { detail: { ok: false } }));
        }
      } catch {
        _supaOk = false;
        window.dispatchEvent(new CustomEvent("supa_status", { detail: { ok: false } }));
      }
    };
    testSupabase(); // lancer au chargement sans bloquer

    const loadData = async (cafe, section) => {
      try {
        const rows = await supaFetch(`/rest/v1/daddy_data?cafe=eq.${encodeURIComponent(cafe)}&section=eq.${encodeURIComponent(section)}&select=data`);
        if (rows !== null) {
          const v = (rows && rows[0]) ? rows[0].data : [];
          // Mettre à jour le fallback localStorage
          try { localStorage.setItem(_lsKey(cafe,section), JSON.stringify(v)); } catch{}
          return v;
        }
        // Supabase KO → fallback localStorage
        const fb = localStorage.getItem(_lsKey(cafe,section));
        return fb ? JSON.parse(fb) : [];
      } catch {
        const fb = localStorage.getItem(_lsKey(cafe,section));
        return fb ? JSON.parse(fb) : [];
      }
    };

    const saveData = async (cafe, section, data) => {
      // Sauvegarder en localStorage comme backup
      try { localStorage.setItem(_lsKey(cafe,section), JSON.stringify(data)); } catch{}
      // Envoyer à Supabase
      const res = await supaFetch("/rest/v1/daddy_data", {
        method: "POST",
        headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify({ cafe, section, data, updated_at: new Date().toISOString() })
      });
      if (res === null) {
        await new Promise(resolve => { _saveQueue.push({cafe, section, data, resolve}); });
        _flushQueue();
        window.dispatchEvent(new CustomEvent("daddy_save_error", { detail: { cafe, section } }));
        return false;
      }
      return true;
    };
    const invalidateCache = () => {}; // no-op, kept for compatibility

    /* ── PALETTE COULEURS DADDY ── */
    const CAFE_COLORS_LIST = ["#d3692D","#E59E00","#8CADA1","#284351","#D7D0BF","#d3692D","#E59E00","#8CADA1","#284351","#D7D0BF"];
    const ADMIN_COLOR = "#B7242B";
    // Gradient CSS inline pour header
    const getCafeHeaderStyle = (cafe, cafes) => {
      const c = CAFE_COLORS_LIST[Math.max(0,cafes.indexOf(cafe)) % CAFE_COLORS_LIST.length];
      const c2 = CAFE_COLORS_LIST[(Math.max(0,cafes.indexOf(cafe))+1) % CAFE_COLORS_LIST.length];
      return { background: `linear-gradient(to right, ${c}, ${c2})` };
    };
    const getCafeDotColor = (cafe, cafes) => CAFE_COLORS_LIST[Math.max(0,cafes.indexOf(cafe)) % CAFE_COLORS_LIST.length];
    // Keep old helpers for backward compat (dot classes replaced by inline)
    const getCafeColor = () => "";

    /* ── CSV EXPORT ── */
    const buildAndDownloadCSV = (rows, filename) => {
      if (rows.length === 0) { alert("Aucune donnée à exporter pour cette période."); return; }
      const headers = sortedHeaders(rows);
      const escape  = (v) => { const s = (v === null || v === undefined) ? "" : String(v).replace(/[\r\n]+/g," "); return s.includes(";") || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s; };
      const csv = [headers.map(escape).join(";"), ...rows.map(r => headers.map(h => escape(r[h])).join(";"))].join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a"); a.href=url; a.download=filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    };
    /* ── Explode adhesion rows into flat lines like other sections ── */
    const MODES_ADH_ALL = ["Espèces","CB","Chèque","Virement","Prélèvement"];
    const explodeAdhesion = (rows, cafe) => {
      const flat = [];
      rows.forEach(r => {
        ["Individuelles","Structure"].forEach(type => {
          const pfx = type === "Individuelles" ? "indiv" : "struc";
          MODES_ADH_ALL.forEach(m => {
            const montant = parseFloat(r[`${pfx}_${m}`]) || 0;
            if (montant === 0) return;
            flat.push({
              ...(cafe ? {Café: cafe} : {}),
              Section: "ADHESION",
              date: r.date,
              semaine: r.semaine,
              mois: r.mois,
              produit: `Adhésion ${type}`,
              mode: m,
              montant,
            });
          });
        });
      });
      return flat;
    };

    const exportToXLSX = (cafe, period, periodType, allData) => {
      const fn = (row) => { if (!row.date) return false; if (periodType==="week") return row.semaine===period; if (periodType==="month") return row.mois===parseInt(period.replace("M","")); return true; };
      const rows = [];
      ["caisseta","tcam","dons","achats","privatisation"].forEach(s => (allData[s]||[]).filter(fn).forEach(r => rows.push({Café:cafe, Section:s.toUpperCase(), TVA:"", ...r})));

      const flash = (m,t="ok") => { setMsg(m); setMsgType(t); setTimeout(()=>setMsg(""),4000); };

      const resetPwd = (login, newP) => {
        if (!newP.trim()) return;
        const upd = users.map(u=>u.login===login?{...u,pwd:b64e(newP)}:u);
        saveUsers(upd); setUsers(upd);
        setEditPwd(p=>{const n={...p};delete n[login];return n;});
        flash(`✅ Mot de passe de « ${login} » mis à jour.`);
      };

      const createCafe = () => {
        if (!newCafe.nom.trim()||!newCafe.login.trim()||!newCafe.pwd.trim()) { flash("⚠️ Remplissez tous les champs.","err"); return; }
        if (users.find(u=>u.login===newCafe.login.trim())) { flash("⚠️ Ce login existe déjà.","err"); return; }
        if (cafes.includes(newCafe.nom.trim())) { flash("⚠️ Ce café existe déjà.","err"); return; }
        const newUser = { login:newCafe.login.trim(), pwd:b64e(newCafe.pwd), role:"cafe", cafe:newCafe.nom.trim() };
        const updUsers = [...users, newUser]; saveUsers(updUsers); setUsers(updUsers);
        const updCafes = [...cafes, newCafe.nom.trim()]; saveCafesList(updCafes); onCafeCreated(updCafes);
        flash(`✅ Café « ${newCafe.nom} » créé (login : ${newCafe.login}).`);
        setNewCafe({nom:"",login:"",pwd:""});
      };

      const saveEjs = () => {
        saveEmailJSConfig(ejsCfg);
        flash("✅ Configuration EmailJS sauvegardée.");
      };

      const sendManual = async (type) => {
        const config = loadEmailJSConfig();
        if (!config.serviceId||!config.templateId||!config.publicKey) { flash("⚠️ Configurez EmailJS d'abord.","err"); return; }
        setSending(type);
        try {
          let rows, subject;
          if (type==="weekly") {
            const lastSun = getLastSunday(); const lastMon = getPreviousMonday(lastSun);
            rows = await collectAllData(cafes, r=>{ if(!r.date)return false; const d=new Date(r.date);d.setHours(0,0,0,0); return d>=lastMon&&d<=lastSun; });
            subject = `☕ Chez Daddy — Rapport hebdo semaine du ${lastMon.toLocaleDateString("fr-FR")} au ${lastSun.toLocaleDateString("fr-FR")}`;
          } else {
            const now=new Date(); const prevMonth=now.getMonth()===0?12:now.getMonth(); const prevYear=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
            rows = await collectAllData(cafes, r=>{ if(!r.date)return false; const d=new Date(r.date); return d.getMonth()+1===prevMonth&&d.getFullYear()===prevYear; });
            subject = `☕ Chez Daddy — Rapport mensuel ${MONTHS[prevMonth-1]} ${prevYear}`;
          }
          const csv = buildCSVString(rows);
          const periodLabel = type==="weekly" ? `hebdo` : `mensuel`;
          const summaryText = rows.length ? buildSummaryText(rows, cafes, periodLabel) : (type==="weekly"?"(aucune donnée cette semaine)":"(aucune donnée ce mois)");
          if (rows.length) buildAndDownloadCSV(rows, `DaddyCafe_${periodLabel}_manuel_${new Date().toISOString().slice(0,10)}.csv`);
          await sendEmailReport(subject, summaryText, config);
          flash(`✅ Rapport ${type==="weekly"?"hebdomadaire":"mensuel"} envoyé à ${DEST_EMAIL}.`);
        } catch(e) { flash(`❌ Erreur envoi : ${e.message}`,"err"); }
        setSending("");
      };

      // ── PURGE données avant une date choisie librement ──
      const defaultCutoff = getStartOfCurrentQuarter().toISOString().slice(0,10);
      const [purgeDate, setPurgeDate] = useState(defaultCutoff);

      const purgeOldData = async () => {
        const cutoff = new Date(purgeDate); cutoff.setHours(0,0,0,0);
        // Export avant purge
        const rows = await collectAllData(cafes, r=>{ if(!r.date)return false; return new Date(r.date)<cutoff; });
        if (rows.length > 0) buildAndDownloadCSV(rows, `DaddyCafe_ARCHIVE_avant_${purgeDate}.csv`);
        // Purge
        let deleted = 0;
        await Promise.all(cafes.map(async cafe=>{
          await Promise.all(["caisseta","tcam","dons","achats","privatisation","adhesion","restocollective"].map(async section=>{
            const data = await loadData(cafe, section);
            const kept = data.filter(r=>!r.date||new Date(r.date)>=cutoff);
            deleted += data.length - kept.length;
            await saveData(cafe, section, kept);
          }));
        }));
        setPurgeConfirm(false);
        setPurgeResult({deleted, cutoff: cutoff.toLocaleDateString("fr-FR"), exported: rows.length>0});
      };

      const cutoffDate = new Date(purgeDate).toLocaleDateString("fr-FR");

      return (
        <div className="space-y-6">
          {/* Statut Supabase */}
          {supaStatus===false&&(
            <div className="bg-rose-50 border-2 border-rose-300 rounded-2xl p-5">
              <div className="flex items-start gap-3">
                <span className="text-2xl">🔴</span>
                <div className="flex-1">
                  <p className="font-bold text-rose-800 mb-1">Base de données inaccessible</p>
                  <p className="text-sm text-rose-700 mb-3">Les données sont sauvegardées localement sur cet appareil uniquement. Les cafés et l'admin ne se voient pas mutuellement.</p>
                  <p className="text-xs font-semibold text-rose-800 mb-2">Exécutez ce SQL dans Supabase (Dashboard → SQL Editor) :</p>
                  <pre className="bg-rose-100 border border-rose-200 rounded-xl p-3 text-xs text-rose-900 overflow-x-auto whitespace-pre">{`CREATE TABLE IF NOT EXISTS daddy_data (
  cafe    TEXT NOT NULL,
  section TEXT NOT NULL,
  data    JSONB DEFAULT '[]',
  updated_at TIMESTAMPTZ DEFAULT NOW(),
  PRIMARY KEY (cafe, section)
);
ALTER TABLE daddy_data DISABLE ROW LEVEL SECURITY;
GRANT ALL ON daddy_data TO anon;`}</pre>
                  <button onClick={()=>testSupabase()} className="mt-3 bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-xl text-sm font-semibold">🔄 Retester la connexion</button>
                </div>
              </div>
            </div>
          )}
          {supaStatus===true&&(
            <div className="bg-emerald-50 border border-emerald-200 rounded-2xl px-5 py-3 flex items-center gap-3">
              <span className="text-xl">🟢</span>
              <div>
                <p className="font-semibold text-emerald-800 text-sm">Base de données connectée</p>
                <p className="text-xs text-emerald-600">Toutes les saisies sont partagées en temps réel entre tous les utilisateurs.</p>
              </div>
            </div>
          )}
          {msg&&<div className={`border text-sm px-4 py-3 rounded-xl ${msgType==="ok"?"bg-emerald-50 border-emerald-200 text-emerald-800":"bg-rose-50 border-rose-200 text-rose-800"}`}>{msg}</div>}

          {/* Créer un café */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-4">🏗️ Créer un nouveau café</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {[["Nom du café","nom","text","Ex: Lyon Presqu'île"],["Login","login","text","Ex: CafeLYP"],["Mot de passe initial","pwd","text","Mot de passe"]].map(([l,k,t,ph])=>(
                <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}</label><input type={t} placeholder={ph} value={newCafe[k]} onChange={e=>setNewCafe(f=>({...f,[k]:e.target.value}))} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"/></div>
              ))}
            </div>
            <button onClick={createCafe} className="mt-3 bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-xl text-sm font-semibold transition-colors">+ Créer le café</button>
          </div>

          {/* Reset mdp — cafés + opérations */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="px-5 py-3 bg-gray-50 border-b border-gray-100"><h3 className="font-semibold text-gray-800">🔑 Gestion des accès</h3></div>
            <div className="divide-y divide-gray-50">
              {users.filter(u=>u.role==="cafe"||u.role==="operations").map(u=>(
                <div key={u.login} className="px-5 py-3 flex flex-wrap items-center gap-3">
                  <div className="flex-1 min-w-48">
                    <span className="font-medium text-sm text-gray-800">{u.cafe||u.login}</span>
                    <span className="ml-2 text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">{u.login}</span>
                    {u.role==="operations"&&<span className="ml-1 text-xs text-indigo-600 bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded-full">Opérations</span>}
                  </div>
                  <div className="flex items-center gap-2">
                    <input type="text" placeholder="Nouveau mot de passe" value={editPwd[u.login]||""} onChange={e=>setEditPwd(p=>({...p,[u.login]:e.target.value}))} className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-amber-300"/>
                    <button onClick={()=>resetPwd(u.login,editPwd[u.login]||"")} className="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors">Réinitialiser</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* EmailJS config */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-1">📧 Configuration emails automatiques</h3>
            <p className="text-xs text-gray-500 mb-4">Les rapports sont envoyés à <strong>{DEST_EMAIL}</strong> dès qu'un utilisateur se connecte : <strong>chaque dimanche</strong> (CSV complet semaine en cours), <strong>chaque lundi</strong> (rapport hebdo semaine précédente) et <strong>chaque 1er du mois</strong> (rapport mensuel).</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
              {[["Service ID","serviceId","Ex: service_xxxxxxx"],["Template ID","templateId","Ex: template_xxxxxxx"],["Public Key","publicKey","Ex: abcXYZ123..."]].map(([l,k,ph])=>(
                <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}</label><input type="text" placeholder={ph} value={ejsCfg[k]||""} onChange={e=>setEjsCfg(c=>({...c,[k]:e.target.value}))} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/></div>
              ))}
            </div>
            <div className="flex flex-wrap gap-2 items-center">
              <button onClick={saveEjs} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors">💾 Sauvegarder la config</button>
              <button onClick={async()=>{ const config=loadEmailJSConfig(); if(!config.publicKey){flash("⚠️ Configurez EmailJS d'abord.","err");return;} setSending("test"); try{ emailjs.init(config.publicKey); await emailjs.send(config.serviceId,config.templateId,{to_email:DEST_EMAIL,subject:"☕ Test Chez Daddy",message:"Bonjour,\n\nCeci est un message de test envoyé depuis l'application Chez Daddy.\n\nSi vous recevez ce message, la configuration EmailJS est correcte !",csv_content:"test"}); flash("✅ Mail de test envoyé à "+DEST_EMAIL+". Vérifiez votre boîte."); }catch(e){flash("❌ Erreur : "+e.message+" — vérifiez vos IDs EmailJS.","err");} setSending(""); }} disabled={!!sending} className="bg-gray-200 hover:bg-gray-300 text-gray-800 disabled:opacity-50 px-4 py-2 rounded-xl text-sm font-semibold transition-colors">
                {sending==="test"?"⏳ Envoi…":"🧪 Envoyer un mail de test"}
              </button>
              <button onClick={()=>sendManual("weekly")} disabled={!!sending} className="bg-blue-100 hover:bg-blue-200 text-blue-800 disabled:opacity-50 px-4 py-2 rounded-xl text-sm font-semibold transition-colors">
                {sending==="weekly"?"⏳ Envoi…":"📤 Envoyer rapport hebdo maintenant"}
              </button>
              <button onClick={()=>sendManual("monthly")} disabled={!!sending} className="bg-blue-100 hover:bg-blue-200 text-blue-800 disabled:opacity-50 px-4 py-2 rounded-xl text-sm font-semibold transition-colors">
                {sending==="monthly"?"⏳ Envoi…":"📤 Envoyer rapport mensuel maintenant"}
              </button>
            </div>
            <div className="mt-3 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 text-xs text-blue-700 space-y-1">
              <p><strong>Comment configurer EmailJS (gratuit, 200 emails/mois) :</strong></p>
              <p>1. Créez un compte sur <strong>emailjs.com</strong></p>
              <p>2. Ajoutez un service email (Gmail ou autre) → notez le <em>Service ID</em></p>
              <p>3. Créez un template avec les variables <code className="bg-blue-100 px-1 rounded">{'{{subject}}'}</code>, <code className="bg-blue-100 px-1 rounded">{'{{message}}'}</code>, <code className="bg-blue-100 px-1 rounded">{'{{to_email}}'}</code> → notez le <em>Template ID</em></p>
              <p>4. Copiez votre <em>Public Key</em> depuis Account → API Keys</p>
            </div>
          </div>

          {/* Purge données */}
          <div className="bg-white rounded-2xl shadow-sm border border-rose-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-1">🗑️ Archivage &amp; purge des données</h3>
            <p className="text-xs text-gray-500 mb-4">
              Choisissez une date limite : toutes les données <strong>strictement antérieures</strong> à cette date seront supprimées sur tous les cafés.<br/>
              <span className="text-rose-600 font-medium">Un export CSV de sauvegarde sera téléchargé automatiquement avant l'effacement.</span>
            </p>
            <div className="flex flex-wrap items-end gap-3 mb-4">
              <div>
                <label className="text-xs text-gray-500 block mb-1 font-medium">Supprimer les données antérieures au</label>
                <input type="date" value={purgeDate} onChange={e=>setPurgeDate(e.target.value)} className="border-2 border-rose-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400"/>
              </div>
              <div className="text-xs text-gray-400 italic pb-2">Suggestion : début du trimestre = <strong>{getStartOfCurrentQuarter().toLocaleDateString("fr-FR")}</strong></div>
            </div>
            {purgeResult&&(
              <div className="mb-4 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-4 py-3 rounded-xl">
                ✅ Purge terminée : <strong>{purgeResult.deleted} ligne(s)</strong> supprimée(s) (données antérieures au {purgeResult.cutoff}).
                {purgeResult.exported&&" Le fichier CSV d'archive a été téléchargé."}
              </div>
            )}
            {!purgeConfirm?(
              <button onClick={()=>setPurgeConfirm(true)} className="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-colors">
                🗑️ Purger les données avant le {cutoffDate}
              </button>
            ):(
              <div className="bg-rose-50 border border-rose-200 rounded-xl p-4">
                <p className="text-sm font-semibold text-rose-800 mb-3">⚠️ Confirmez-vous la suppression de toutes les données antérieures au <strong>{cutoffDate}</strong> sur tous les cafés ?</p>
                <div className="flex gap-3">
                  <button onClick={purgeOldData} className="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2 rounded-xl text-sm font-semibold transition-colors">Oui, purger (archive auto)</button>
                  <button onClick={()=>setPurgeConfirm(false)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2 rounded-xl text-sm font-semibold transition-colors">Annuler</button>
                </div>
              </div>
            )}
          </div>

          {/* Liste cafés + toggle RC */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-1">☕ Cafés actifs ({cafes.length})</h3>
            <p className="text-xs text-gray-400 mb-3">Activez l'onglet Restauration Collective pour chaque café concerné.</p>
            <RCToggleList cafes={cafes}/>
          </div>
        </div>
      );
    };

    /* ── SECTION CaisseTA ── */
    const SectionCaisseTA = ({ cafe, carte, refreshTick=0 }) => {
      const [rows,setRows]=useState([]); const [date,setDate]=useState(new Date().toISOString().slice(0,10));
      const [mode,setMode]=useState("CB"); const [panier,setPanier]=useState([]); const [selProd,setSelProd]=useState(""); const [loading,setLoading]=useState(true);
      const [confirmId,setConfirmId]=useState(null);
      useEffect(()=>{loadData(cafe,"caisseta").then(d=>{setRows(d);setLoading(false);});},[cafe,refreshTick]);
      const total = panier.reduce((s,l)=>s+l.prix_unitaire*l.qte,0);
      const add = (label) => { if(!label)return; const item=carte.find(c=>c.label===label); if(!item)return; setPanier(p=>{const ei=p.findIndex(l=>l.produit===label); if(ei>=0){const c=[...p];c[ei]={...c[ei],qte:c[ei].qte+1};return c;} return [...p,{produit:label,prix_unitaire:item.prix,qte:1,typo:item.type}];}); setSelProd(""); };
      const upd = (i,d)=>setPanier(p=>{const c=[...p];c[i]={...c[i],qte:Math.max(1,c[i].qte+d)};return c;});
      const rem = (i)=>setPanier(p=>p.filter((_,j)=>j!==i));
      const valider = async()=>{ if(!panier.length||!date)return; const now=Date.now(); const nr=panier.map((l,i)=>({id:now+i,date,semaine:getWeekForDate(date),mois:getMonthForDate(date),produit:l.produit,qte:l.qte,prix_unitaire:l.prix_unitaire,prix_total:parseFloat((l.prix_unitaire*l.qte).toFixed(2)),mode,typo:l.typo})); const upd=[...nr,...rows]; setRows(upd); setPanier([]); await saveData(cafe,"caisseta",upd); loadData(cafe,"caisseta").then(d=>{if(d&&d.length>=0)setRows(d);}); };
      const del = async(id)=>{ setConfirmId(null); const u=rows.filter(r=>r.id!==id); setRows(u); await saveData(cafe,"caisseta",u); loadData(cafe,"caisseta").then(d=>{if(d&&d.length>=0)setRows(d);}); };
      if(loading)return<div className="p-8 text-center text-gray-400">Chargement...</div>;
      const softs=carte.filter(c=>c.type==="Soft"), alcools=carte.filter(c=>c.type==="Alcool"), nourr=carte.filter(c=>c.type==="Snacking");
      return (
        <div className="space-y-6">
          {confirmId&&<ConfirmDialog msg="Confirmez-vous vouloir supprimer cette ligne ?" onOui={()=>del(confirmId)} onNon={()=>setConfirmId(null)}/>}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-4">🍺 Nouvelle commande TA</h3>
            <div className="mb-4"><label className="text-xs text-gray-500 block mb-1">Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-48 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-300"/></div>
            <div className="mb-4 space-y-2">
              {[["Softs","teal",softs],["Alcools","amber",alcools],["Snacking","rose",nourr]].map(([lbl,col,items])=>(
                <div key={lbl}><p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{lbl}</p>
                  <div className="flex flex-wrap gap-2">{items.map(c=><button key={c.id} onClick={()=>add(c.label)} className={`bg-${col}-50 hover:bg-${col}-100 border border-${col}-200 text-${col}-800 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors`}>{c.label} <span className="opacity-60">{c.prix}€</span></button>)}</div>
                </div>
              ))}
              <div className="mt-3"><select value={selProd} onChange={e=>add(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-emerald-300"><option value="">+ Ajouter via la liste complète…</option>{carte.map(c=><option key={c.id} value={c.label}>{c.label} ({c.prix}€)</option>)}</select></div>
            </div>
            {panier.length>0&&(
              <div className="border border-emerald-100 rounded-xl overflow-hidden mb-4">
                <div className="bg-emerald-50 px-4 py-2 text-xs font-semibold text-emerald-700 uppercase tracking-wide">🛒 Panier</div>
                {panier.map((l,i)=>(
                  <div key={i} className="flex items-center justify-between px-4 py-2 border-t border-emerald-50">
                    <span className="text-sm text-gray-700 flex-1">{l.produit}</span><span className="text-xs text-gray-400 mr-3">{l.prix_unitaire}€ / u</span>
                    <div className="flex items-center gap-2"><button onClick={()=>upd(i,-1)} className="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-bold flex items-center justify-center">−</button><span className="w-5 text-center text-sm font-medium">{l.qte}</span><button onClick={()=>upd(i,+1)} className="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-bold flex items-center justify-center">+</button></div>
                    <span className="w-16 text-right font-semibold text-emerald-600 text-sm">{(l.prix_unitaire*l.qte).toFixed(2)}€</span>
                    <button onClick={()=>rem(i)} className="ml-3 text-rose-400 hover:text-rose-600 text-xs">✕</button>
                  </div>
                ))}
              </div>
            )}
            <div className="flex items-center justify-between mt-2 gap-4">
              <div>{panier.length>0?<div className="bg-emerald-500 text-white rounded-xl px-5 py-3 text-center shadow-sm"><p className="text-xs opacity-80 uppercase tracking-wide">À encaisser</p><p className="text-3xl font-bold">{total.toFixed(2)} €</p><p className="text-xs opacity-80">{mode} · {getWeekForDate(date)}</p></div>:<span className="text-sm text-gray-400">Ajoutez des produits ci-dessus</span>}</div>
              <div className="flex flex-col items-stretch gap-2 min-w-48">
                <div><label className="text-xs text-gray-500 block mb-1 font-medium">Mode de règlement *</label><select value={mode} onChange={e=>setMode(e.target.value)} className="w-full border-2 border-emerald-200 rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-400 bg-emerald-50">{MODES.map(m=><option key={m}>{m}</option>)}</select></div>
                <button onClick={valider} disabled={!panier.length} className="bg-emerald-500 hover:bg-emerald-600 disabled:opacity-40 disabled:cursor-not-allowed text-white px-6 py-3 rounded-xl text-sm font-semibold transition-colors shadow-sm">✅ Valider & enregistrer</button>
                {panier.length>0&&<button onClick={()=>setPanier([])} className="text-xs text-gray-400 hover:text-gray-600 text-center">Vider le panier</button>}
              </div>

              <div className="overflow-x-auto"><table className="w-full text-sm">
                <thead><tr className="bg-gray-50 border-b border-gray-100">{["Café","TA","TCAM","Dons","Achats","Privatisations","Adhésions","Restau","Total encaissé"].map(h=><th key={h} className="text-left px-4 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}</tr></thead>
                <tbody>
                  {stats.map(({cafe,ta,tc,dn,ac,pv,adh,total},i)=>(
                    <tr key={cafe} className="border-t border-gray-50 hover:bg-gray-50 transition-colors">
                      <td className="px-4 py-3"><div className="flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor:CAFE_COLORS_LIST[i%CAFE_COLORS_LIST.length]}}></span><span className="font-medium text-gray-800">{cafe}</span></div></td>
                      <td className="px-4 py-3 text-emerald-600 font-medium">{ta.toFixed(2)} €</td>
                      <td className="px-4 py-3 text-amber-600 font-medium">{tc.toFixed(2)} €</td>

                {[...MODES,"Prélèvement"].map(m=>{

              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4"><h4 className="text-sm font-semibold text-gray-700 mb-3">TA global — Répartition par type</h4>{["Soft","Alcool","Snacking"].map(t=>{const v=stats.reduce((s,c)=>s+sum(c.fTA.filter(r=>r.typo===t)),0);if(v===0)return null;return<div key={t} className="flex justify-between items-center py-1.5 border-b border-gray-50 last:border-0"><span className="text-sm text-gray-600">{t}</span><span className="font-semibold text-emerald-600">{v.toFixed(2)} €</span></div>;})} {["Soft","Alcool","Snacking"].every(t=>stats.reduce((s,c)=>s+sum(c.fTA.filter(r=>r.typo===t)),0)===0)&&<p className="text-sm text-gray-400 text-center py-4">Aucune donnée</p>}</div>
            </div>

            </div>

              <div className="px-5 py-3 bg-gray-50 border-b border-gray-100"><h4 className="text-sm font-semibold text-gray-700">📈 P&L annuel 2026 — Tous cafés</h4></div>

                <table className="w-full text-xs">

                  </tr></thead>
                  <tbody>
                    {(()=>{
                      const sumM=(arr,key)=>MONTHS.map((_,i)=>arr.filter(r=>r.mois===i+1).reduce((s,r)=>s+(parseFloat(r[key])||0),0));
                      const addM=(a,b)=>a.map((v,i)=>v+b[i]);
                      let recM=MONTHS.map(()=>0), acM=MONTHS.map(()=>0);
                      cafes.forEach(c=>{
                        const d=allCafesData[c]||{};
                        recM=addM(recM,addM(addM(addM(addM(sumM(d.caisseta||[],"prix_total"),sumM(d.tcam||[],"montant")),sumM(d.dons||[],"montant")),sumM(d.adhesion||[],"total")),sumM(d.restocollective||[],"ht_total")));
                        acM=addM(acM,sumM(d.achats||[],"montant"));
                      });
                      const margeM=recM.map((v,i)=>v-acM[i]);
                      const totRec=recM.reduce((a,b)=>a+b,0), totAc=acM.reduce((a,b)=>a+b,0), totMarge=totRec-totAc;

                        <tr className="border-t border-gray-50 hover:bg-gray-50">
                          <td className="px-3 py-2 font-medium text-emerald-700">Recettes</td>

                          <td className={`px-3 py-2 text-right font-bold ${totMarge>=0?"text-emerald-700":"text-rose-700"}`}>{fmt(totMarge)}</td>

    /* ── SECTION ADHÉSION ── */
    const MODES_ADH = ["Espèces","CB","Chèque","Virement","Prélèvement"];
    const mkAdhForm = () => ({
      semaine: getCurrentWeekLabel(),
      indiv_Espèces:"", indiv_CB:"", indiv_Chèque:"", indiv_Virement:"", indiv_Prélèvement:"",

    const SectionAdhesion = ({ cafe, refreshTick=0 }) => {
      const [rows,setRows]   = useState([]);
      const [form,setForm]   = useState(mkAdhForm());
      const [loading,setLoading] = useState(true);
      const [confirmId,setConfirmId] = useState(null);

      useEffect(()=>{ loadData(cafe,"adhesion").then(d=>{ setRows(d); setLoading(false); }); },[cafe,refreshTick]);

      const totalIndiv = MODES_ADH.reduce((s,m)=>s+(parseFloat(form[`indiv_${m}`])||0),0);
      const totalStruc = MODES_ADH.reduce((s,m)=>s+(parseFloat(form[`struc_${m}`])||0),0);

      const submit = async () => {
        if (!form.semaine) return;
        const nr = {
          id: Date.now(),
          semaine: form.semaine,
          mois: (() => { const w=WEEKS_2026.find(w=>w.label===form.semaine); return w ? w.start.getMonth()+1 : null; })(),
          date: (() => { const w=WEEKS_2026.find(w=>w.label===form.semaine); return w ? w.start.toISOString().slice(0,10) : ""; })(),
        };
        MODES_ADH.forEach(m=>{
          nr[`indiv_${m}`] = parseFloat(form[`indiv_${m}`])||0;
          nr[`struc_${m}`] = parseFloat(form[`struc_${m}`])||0;
        });
        nr.total_indiv = totalIndiv;
        nr.total_struc = totalStruc;
        nr.total       = totalIndiv + totalStruc;
        const upd = [nr,...rows];
        setRows(upd);
        await saveData(cafe,"adhesion",upd);
        setForm(mkAdhForm());
      };

      const del = async (id) => { setConfirmId(null); const u=rows.filter(r=>r.id!==id); setRows(u); await saveData(cafe,"adhesion",u); loadData(cafe,"adhesion").then(d=>{if(d&&d.length>=0)setRows(d);}); };

      if(loading) return <div className="p-8 text-center text-gray-400">Chargement...</div>;

      return (
        <div className="space-y-6">
          {confirmId&&<ConfirmDialog msg="Confirmez-vous vouloir supprimer cette ligne ?" onOui={()=>del(confirmId)} onNon={()=>setConfirmId(null)}/>}

          {/* Titre informatif */}
          <div className="bg-amber-50 border border-amber-200 rounded-2xl px-5 py-3 flex items-start gap-3">
            <span className="text-amber-500 text-lg mt-0.5">ℹ️</span>
            <div>
              <p className="font-semibold text-amber-800 text-sm">🤝 Adhésions</p>
              <p className="text-xs text-amber-700 mt-0.5">Renseignements portés ici à titre informatif. Ces montants sont remontés dans les dashboards et le P&L.</p>
            </div>
          </div>

          {/* Formulaire */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-4">Nouvelle saisie</h3>
            <div className="mb-4">
              <label className="text-xs text-gray-500 block mb-1">Semaine</label>
              <select value={form.semaine} onChange={e=>setForm(f=>({...f,semaine:e.target.value}))}
                className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {WEEKS_2026.map(w=><option key={w.label} value={w.label}>{w.label} ({w.start.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})} → {w.end.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})})</option>)}
              </select>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm mb-4">
                <thead><tr className="bg-gray-50">
                  <th className="text-left px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wide">Type</th>
                  {MODES_ADH.map(m=><th key={m} className="text-center px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wide">{m}</th>)}

                </tr></thead>
                <tbody>
                  {[["Individuelles","indiv"],["Structure","struc"]].map(([lbl,pfx])=>(
                    <tr key={pfx} className="border-t border-gray-50">
                      <td className="px-3 py-2 font-medium text-gray-700">{lbl}</td>
                      {MODES_ADH.map(m=>(
                        <td key={m} className="px-2 py-2">
                          <input type="number" step="0.5" min="0" placeholder="0"
                            value={form[`${pfx}_${m}`]}
                            onChange={e=>setForm(f=>({...f,[`${pfx}_${m}`]:e.target.value}))}
                            className="w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
                        </td>
                      ))}
                      <td className="px-3 py-2 text-right font-bold text-indigo-700">
                        {(pfx==="indiv"?totalIndiv:totalStruc).toFixed(2)} €
                      </td>
                    </tr>
                  ))}
                  <tr className="border-t-2 border-gray-200 bg-gray-50">
                    <td className="px-3 py-2 font-bold text-gray-800">TOTAL</td>
                    {MODES_ADH.map(m=>{
                      const v=(parseFloat(form[`indiv_${m}`])||0)+(parseFloat(form[`struc_${m}`])||0);
                      return <td key={m} className="px-2 py-2 text-center font-semibold text-gray-700">{v>0?`${v.toFixed(2)}€`:"—"}</td>;
                    })}
                    <td className="px-3 py-2 text-right font-bold text-indigo-800">{(totalIndiv+totalStruc).toFixed(2)} €</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <button onClick={submit} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-sm font-semibold transition-colors">

              <thead><tr className="bg-gray-50">
                {["Semaine","Indiv. total","Struc. total","Total","Suppr."].map((h,i)=><th key={i} className="text-left px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}

    /* ── SECTION COMPTE MONNAIE ── */
