      {label:"0.10 €",val:0.10,type:"piece"},{label:"0.20 €",val:0.20,type:"piece"},{label:"0.50 €",val:0.50,type:"piece"},
      {label:"1 €",val:1,type:"piece"},{label:"2 €",val:2,type:"piece"},
      {label:"5 €",val:5,type:"billet"},{label:"10 €",val:10,type:"billet"},{label:"20 €",val:20,type:"billet"},
      {label:"50 €",val:50,type:"billet"},{label:"100 €",val:100,type:"billet"},{label:"200 €",val:200,type:"billet"},
    ];
    const SectionMonnaie = ({ cafe }) => {
      const [periode,setPeriode]=useState("day");
      const [dateJ,setDateJ]=useState(new Date().toISOString().slice(0,10));
      const [sw,setSw]=useState(getCurrentWeekLabel());
      const [encaisse,setEncaisse]=useState({CB:0,Espèces:0,Chèque:0,Virement:0});
      const [qtes,setQtes]=useState(Object.fromEntries(PIECES.map(p=>[p.label,0])));
      const [loading,setLoading]=useState(false);

      useEffect(()=>{
        setLoading(true);
        Promise.all([loadData(cafe,"caisseta"),loadData(cafe,"tcam"),loadData(cafe,"dons")]).then(([ct,tc,dn])=>{
          const filterFn = r => {
            if(!r.date) return false;
            if(periode==="day") return r.date===dateJ;
            return r.semaine===sw;
          };
          const sumMode=(arr,key="prix_total")=> MODES.reduce((acc,m)=>({...acc,[m]:acc[m]+(arr.filter(r=>filterFn(r)&&r.mode===m).reduce((s,r)=>s+(parseFloat(r[key])||0),0))}),{CB:0,Espèces:0,Chèque:0,Virement:0});
          const taE=sumMode(ct,"prix_total"), tcE=sumMode(tc,"montant"), dnE=sumMode(dn,"montant");
          setEncaisse(MODES.reduce((acc,m)=>({...acc,[m]:(taE[m]||0)+(tcE[m]||0)+(dnE[m]||0)}),{}));
          setLoading(false);
        });
      },[cafe,periode,dateJ,sw]);

      const totalMonnaie=PIECES.reduce((s,p)=>s+(qtes[p.label]||0)*p.val,0);
      const totalPieces=PIECES.filter(p=>p.type==="piece").reduce((s,p)=>s+(qtes[p.label]||0)*p.val,0);
      const totalBillets=PIECES.filter(p=>p.type==="billet").reduce((s,p)=>s+(qtes[p.label]||0)*p.val,0);
      const totalEncaisse=Object.values(encaisse).reduce((a,b)=>a+b,0);
      const ecart=totalMonnaie-(encaisse["Espèces"]||0);

      return (
        <div className="space-y-6">
          {/* Période */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-4">💰 Compte Monnaie</h3>
            <div className="flex flex-wrap gap-3 items-end mb-4">
              <div className="flex gap-2">
                <button onClick={()=>setPeriode("day")} className={`px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${periode==="day"?"bg-amber-500 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>Jour</button>
                <button onClick={()=>setPeriode("week")} className={`px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${periode==="week"?"bg-amber-500 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>Semaine</button>
              </div>
              {periode==="day"&&<input type="date" value={dateJ} onChange={e=>setDateJ(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"/>}
              {periode==="week"&&<select value={sw} onChange={e=>setSw(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">{WEEKS_2026.map(w=><option key={w.label} value={w.label}>{w.label} ({w.start.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})} → {w.end.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})})</option>)}</select>}
            </div>
            {/* Encaissé par mode */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-2">
              {MODES.map(m=><div key={m} className="bg-gray-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-500 mb-1">{m}</p><p className="font-bold text-gray-800">{(encaisse[m]||0).toFixed(2)} €</p></div>)}
            </div>
            <div className="text-right text-sm text-gray-500">Total encaissé Espèces : <strong className="text-gray-800">{(encaisse["Espèces"]||0).toFixed(2)} €</strong></div>
          </div>

          {/* Comptage monnaie */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-4">🪙 Comptage de la caisse</h3>
            {/* Pièces */}
            <div className="mb-4">
              <div className="flex items-center justify-between mb-2">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">🪙 Pièces (0.10€ → 2€)</p>
                <span className="text-sm font-bold text-amber-700 bg-amber-50 px-3 py-1 rounded-lg">Sous-total : {totalPieces.toFixed(2)} €</span>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                {PIECES.filter(p=>p.type==="piece").map(p=>(
                  <div key={p.label} className="flex items-center gap-2 bg-amber-50 rounded-xl px-3 py-2">
                    <span className="text-sm font-medium text-amber-800 w-14 flex-shrink-0">{p.label}</span>
                    <input type="number" min="0" value={qtes[p.label]||""} placeholder="0"
                      onChange={e=>setQtes(q=>({...q,[p.label]:Math.max(0,parseInt(e.target.value)||0)}))}
                      className="w-16 border border-amber-200 rounded-lg px-2 py-1 text-sm text-center focus:outline-none focus:ring-2 focus:ring-amber-300"/>
                    <span className="text-xs text-amber-600 ml-1">= {((qtes[p.label]||0)*p.val).toFixed(2)}€</span>
                  </div>
                ))}
              </div>
            </div>
            {/* Billets */}
            <div className="mb-3">
              <div className="flex items-center justify-between mb-2">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">💵 Billets (5€ → 200€)</p>
                <span className="text-sm font-bold text-emerald-700 bg-emerald-50 px-3 py-1 rounded-lg">Sous-total : {totalBillets.toFixed(2)} €</span>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                {PIECES.filter(p=>p.type==="billet").map(p=>(
                  <div key={p.label} className="flex items-center gap-2 bg-emerald-50 rounded-xl px-3 py-2">
                    <span className="text-sm font-medium text-emerald-800 w-14 flex-shrink-0">{p.label}</span>
                    <input type="number" min="0" value={qtes[p.label]||""} placeholder="0"
                      onChange={e=>setQtes(q=>({...q,[p.label]:Math.max(0,parseInt(e.target.value)||0)}))}
                      className="w-16 border border-emerald-200 rounded-lg px-2 py-1 text-sm text-center focus:outline-none focus:ring-2 focus:ring-emerald-300"/>
                    <span className="text-xs text-emerald-600 ml-1">= {((qtes[p.label]||0)*p.val).toFixed(2)}€</span>
                  </div>
                ))}
              </div>
            </div>
            <button onClick={()=>setQtes(Object.fromEntries(PIECES.map(p=>[p.label,0])))} className="mt-1 text-xs text-gray-400 hover:text-gray-600">Réinitialiser</button>
          </div>

          {/* Totaux */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <div className="grid grid-cols-3 gap-4">
              <div className="text-center p-4 bg-amber-50 rounded-2xl">
                <p className="text-xs text-gray-500 mb-1 uppercase tracking-wide">Total en caisse</p>
                <p className="text-2xl font-bold text-amber-700">{totalMonnaie.toFixed(2)} €</p>
              </div>
              <div className="text-center p-4 bg-emerald-50 rounded-2xl">
                <p className="text-xs text-gray-500 mb-1 uppercase tracking-wide">Encaissé Espèces</p>
                <p className="text-2xl font-bold text-emerald-700">{(encaisse["Espèces"]||0).toFixed(2)} €</p>
              </div>
              <div className={`text-center p-4 rounded-2xl ${Math.abs(ecart)<0.01?"bg-gray-50":ecart>0?"bg-emerald-50":"bg-rose-50"}`}>
                <p className="text-xs text-gray-500 mb-1 uppercase tracking-wide">Écart</p>
                <p className={`text-2xl font-bold ${Math.abs(ecart)<0.01?"text-gray-600":ecart>0?"text-emerald-700":"text-rose-700"}`}>{ecart>=0?"+":""}{ecart.toFixed(2)} €</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ── SECTION RESTAURATION COLLECTIVE ── */
    const SectionRestoCollective = ({ cafe, carte, refreshTick=0 }) => {
      const [rows,setRows]     = useState([]);
      const [loading,setLoading] = useState(true);
      const [confirmId,setConfirmId] = useState(null);
      const [date,setDate]     = useState(new Date().toISOString().slice(0,10));
      const [mode,setMode]     = useState("CB");
      const [panier,setPanier] = useState([]);
      const [selProd,setSelProd] = useState("");

      useEffect(()=>{ loadData(cafe,"restocollective").then(d=>{ setRows(d); setLoading(false); }); },[cafe,refreshTick]);

      const calcTVA = (item) => {
        // Pour les produits Resto Coll., utiliser rcType pour la TVA
        const tvaKey = item.rcType || (item.type==="Snacking"?"Snacking":item.type);
        const rate = TVA_RATES[tvaKey] || 0.20;
        const ttc  = item.prix;
        const ht   = parseFloat((ttc / (1+rate)).toFixed(4));
        const tva  = parseFloat((ttc - ht).toFixed(4));
        return { rate, ht, tva };
      };

      const totalTTC   = panier.reduce((s,l)=>s+l.prix_unitaire*l.qte,0);
      const totalTVA   = panier.reduce((s,l)=>s+l.tva_unitaire*l.qte,0);
      const totalHT    = totalTTC - totalTVA;

      const add = (label) => {
        if(!label) return;
        const item = carte.find(c=>c.label===label);
        if(!item) return;
        const {rate,ht,tva} = calcTVA(item);
        setPanier(p=>{
          const ei=p.findIndex(l=>l.produit===label);
          if(ei>=0){ const c=[...p]; c[ei]={...c[ei],qte:c[ei].qte+1}; return c; }
          return [...p,{produit:label,typo:item.type,prix_unitaire:item.prix,tva_rate:rate,ht_unitaire:parseFloat(ht.toFixed(2)),tva_unitaire:parseFloat(tva.toFixed(2)),qte:1}];
        });
        setSelProd("");
      };
      const upd = (i,d)=>setPanier(p=>{const c=[...p];c[i]={...c[i],qte:Math.max(1,c[i].qte+d)};return c;});
      const rem = (i)=>setPanier(p=>p.filter((_,j)=>j!==i));

      const valider = async () => {
        if(!panier.length||!date) return;
        const now=Date.now();
        const nr=panier.map((l,i)=>({
          id:now+i, date, semaine:getWeekForDate(date), mois:getMonthForDate(date),
          produit:l.produit, typo:l.typo, qte:l.qte,
          prix_unitaire:l.prix_unitaire,
          prix_total:parseFloat((l.prix_unitaire*l.qte).toFixed(2)),
          tva_rate:l.tva_rate,
          tva_unitaire:l.tva_unitaire,
          tva_total:parseFloat((l.tva_unitaire*l.qte).toFixed(2)),
          ht_unitaire:l.ht_unitaire,
          ht_total:parseFloat((l.ht_unitaire*l.qte).toFixed(2)),
          mode,
        }));
        const upd=[...nr,...rows]; setRows(upd);
        setPanier([]);
        await saveData(cafe,"restocollective",upd);
        loadData(cafe,"restocollective").then(d=>{if(d&&d.length>=0)setRows(d);});
      };

      const del = async(id)=>{ setConfirmId(null); const u=rows.filter(r=>r.id!==id); setRows(u); await saveData(cafe,"restocollective",u); loadData(cafe,"restocollective").then(d=>{if(d&&d.length>=0)setRows(d);}); };

      if(loading) return <div className="p-8 text-center text-gray-400">Chargement...</div>;

      const softs  = carte.filter(c=>c.type==="Soft");
      const alcools= carte.filter(c=>c.type==="Alcool");
      const nourr  = carte.filter(c=>c.type==="Snacking");
      const rcProd = carte.filter(c=>c.type==="Resto Coll.");

      return (
        <div className="space-y-6">
          {confirmId&&<ConfirmDialog msg="Confirmez-vous vouloir supprimer cette ligne ?" onOui={()=>del(confirmId)} onNon={()=>setConfirmId(null)}/>}

          {/* Info TVA */}
          <div className="bg-orange-50 border border-orange-200 rounded-2xl px-5 py-3 flex items-start gap-3">
            <span className="text-orange-500 text-lg mt-0.5">ℹ️</span>
            <div className="text-xs text-orange-800">
              <strong>TVA appliquée automatiquement</strong> — Prix saisis TTC :<br/>
              🍽️ Snacking : TVA 10% | 🍴 Restauration Coll. : TVA selon type | 🥤 Softs : TVA 20% | 🍺 Alcools : TVA 20%
            </div>
          </div>

          {/* Formulaire */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="font-semibold text-gray-800 mb-4">🍽️ Nouvelle commande Restauration Collective</h3>
            <div className="mb-4"><label className="text-xs text-gray-500 block mb-1">Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-48 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300"/></div>

            <div className="mb-4 space-y-2">
              {[["🍽️ Snacking (TVA 10%)","rose",nourr],["🥤 Softs (TVA 20%)","teal",softs],["🍺 Alcools (TVA 20%)","amber",alcools],["🍴 Restauration Collective","orange",rcProd]].map(([lbl,col,items])=>(
                <div key={lbl}>
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{lbl}</p>
                  <div className="flex flex-wrap gap-2">
                    {items.map(c=><button key={c.id} onClick={()=>add(c.label)} className={`bg-${col}-50 hover:bg-${col}-100 border border-${col}-200 text-${col}-800 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors`}>{c.label} <span className="opacity-60">{c.prix}€ TTC</span></button>)}
                  </div>
                </div>
              ))}
              <div className="mt-2"><select value={selProd} onChange={e=>add(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-orange-300"><option value="">+ Ajouter via la liste complète…</option>{carte.map(c=><option key={c.id} value={c.label}>{c.label} ({c.prix}€ TTC — TVA {(TVA_RATES[c.rcType||c.type]||0.20)*100}%)</option>)}</select></div>
            </div>

            {/* Panier */}
            {panier.length>0&&(
              <div className="border border-orange-100 rounded-xl overflow-hidden mb-4">
                <div className="bg-orange-50 px-4 py-2 text-xs font-semibold text-orange-700 uppercase tracking-wide">🛒 Panier</div>
                {panier.map((l,i)=>(
                  <div key={i} className="flex items-center justify-between px-4 py-2 border-t border-orange-50 text-sm">
                    <span className="flex-1 text-gray-700">{l.produit}</span>
                    <span className="text-xs text-gray-400 mr-2">HT:{l.ht_unitaire}€ TVA:{(l.tva_rate*100).toFixed(0)}%</span>
                    <div className="flex items-center gap-1">
                      <button onClick={()=>upd(i,-1)} className="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-xs font-bold flex items-center justify-center">−</button>
                      <span className="w-5 text-center font-medium">{l.qte}</span>
                      <button onClick={()=>upd(i,+1)} className="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-xs font-bold flex items-center justify-center">+</button>
                    </div>
                    <span className="w-20 text-right font-semibold text-orange-600">{(l.prix_unitaire*l.qte).toFixed(2)}€ TTC</span>
                    <button onClick={()=>rem(i)} className="ml-2 text-rose-400 hover:text-rose-600 text-xs">✕</button>
                  </div>
                ))}
                <div className="px-4 py-2 bg-orange-50 border-t border-orange-100 text-xs text-gray-600 flex gap-4">
                  <span>HT : <strong>{totalHT.toFixed(2)} €</strong></span>
                  <span>TVA : <strong>{totalTVA.toFixed(2)} €</strong></span>
                  <span className="font-bold text-orange-700">TTC : {totalTTC.toFixed(2)} €</span>
                </div>
              </div>
            )}

            <div className="flex items-center justify-between mt-2 gap-4">
              <div>{panier.length>0
                ? <div className="bg-orange-500 text-white rounded-xl px-5 py-3 shadow-sm text-center">
                    <p className="text-xs opacity-80 uppercase tracking-wide">À encaisser TTC</p>
                    <p className="text-3xl font-bold">{totalTTC.toFixed(2)} €</p>
                    <p className="text-xs opacity-70">dont TVA {totalTVA.toFixed(2)} €</p>
                  </div>
                : <span className="text-sm text-gray-400">Ajoutez des produits ci-dessus</span>
              }</div>
              <div className="flex flex-col gap-2 min-w-48">
                <div><label className="text-xs text-gray-500 block mb-1 font-medium">Mode de règlement *</label>
                  <select value={mode} onChange={e=>setMode(e.target.value)} className="w-full border-2 border-orange-200 rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-400 bg-orange-50">{MODES.map(m=><option key={m}>{m}</option>)}</select>
                </div>
                <button onClick={valider} disabled={!panier.length} className="bg-orange-500 hover:bg-orange-600 disabled:opacity-40 text-white px-6 py-3 rounded-xl text-sm font-semibold transition-colors">✅ Valider & enregistrer</button>
                {panier.length>0&&<button onClick={()=>setPanier([])} className="text-xs text-gray-400 hover:text-gray-600 text-center">Vider le panier</button>}
              </div>
            </div>
          </div>

          {/* Historique */}
          <div className="overflow-x-auto rounded-xl border border-gray-100 shadow-sm">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50">
                {["Date","Sem.","Produit","Typo","Qté","HT unit.","TVA%","TVA unit.","TTC unit.","TTC total","Mode","Suppr."].map((h,i)=><th key={i} className="text-left px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}
              </tr></thead>
              <tbody>
                {rows.length===0?<tr><td colSpan={12} className="text-center py-8 text-gray-400 text-sm">Aucune donnée</td></tr>
                  :rows.slice(0,100).map((r,i)=><tr key={i} className="border-t border-gray-50 hover:bg-gray-50">
                    <td className="px-3 py-2 text-gray-700">{r.date}</td>
                    <td className="px-3 py-2 text-gray-500">{r.semaine}</td>
                    <td className="px-3 py-2 text-gray-700">{r.produit}</td>
                    <td className="px-3 py-2 text-gray-500 text-xs">{r.typo}</td>
                    <td className="px-3 py-2 text-center">{r.qte}</td>
                    <td className="px-3 py-2">{r.ht_unitaire?.toFixed(2)}€</td>
                    <td className="px-3 py-2">{((r.tva_rate||0)*100).toFixed(0)}%</td>
                    <td className="px-3 py-2 text-orange-600">{r.tva_unitaire?.toFixed(2)}€</td>
                    <td className="px-3 py-2">{r.prix_unitaire?.toFixed(2)}€</td>
                    <td className="px-3 py-2 font-bold text-orange-700">{r.prix_total?.toFixed(2)}€</td>
                    <td className="px-3 py-2"><Badge color="amber">{r.mode}</Badge></td>
                    <td className="px-3 py-2"><button onClick={()=>setConfirmId(r.id)} className="text-rose-400 hover:text-rose-600 text-xs">✕</button></td>
                  </tr>)
                }
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    /* ── MAIN APP ── */
    const TABS_BASE = [
      {id:"dashboard",label:"📊 Dashboard"},{id:"caisseta",label:"🍺 Caisse TA"},{id:"tcam",label:"🏠 TCAM"},
      {id:"dons",label:"💝 Dons"},{id:"achats",label:"🛒 Achats"},{id:"privatisation",label:"🎉 Privat."},
      {id:"carte",label:"🃏 Carte"},{id:"monnaie",label:"💰 Monnaie"},{id:"adhesion",label:"🤝 Adhésion"},
    ];

    function App() {
      const [session,setSession]   = useState(()=>loadSession());
      const [cafes,setCafes]       = useState(()=>loadCafesList());
      const [tab,setTab]           = useState("dashboard");
      const [selCafe,setSelCafe]   = useState(null);
      const [carte,setCarte]       = useState(DEFAULT_CARTE);
      const [carteLoaded,setCarteLoaded] = useState(false);
      const [menuOpen,setMenuOpen] = useState(false);
      const [globalView,setGlobalView] = useState(false);
      const [rcEnabled,setRcEnabled] = useState({});
      const [saveError,setSaveError] = useState(null);
      const [supaStatus,setSupaStatus] = useState(null); // null=test en cours, true=OK, false=KO

      useEffect(()=>{
        const h = (e) => setSupaStatus(e.detail.ok);
        window.addEventListener("supa_status", h);
        return () => window.removeEventListener("supa_status", h);
      },[]);
      const [subTabAdmin,setSubTabAdmin] = useState("dashboard"); // "dashboard" ou "admin"
      const [allCafesData,setAllCafesData] = useState({});
      const [allCafesLoaded,setAllCafesLoaded] = useState(false);
      const [allCafesLoading,setAllCafesLoading] = useState(false);

      // Refresh RC state when café changes or admin toggles
      useEffect(()=>{ loadRCEnabled().then(r=>setRcEnabled(r||{})); },[]);
      useEffect(()=>{ const h=()=>loadRCEnabled().then(r=>setRcEnabled(r||{})); window.addEventListener("rc_updated",h); return()=>window.removeEventListener("rc_updated",h); },[]);
      useEffect(()=>{
        const h=(e)=>{ setSaveError(`❌ Erreur sauvegarde (${e.detail?.section||"?"}) — vérifiez votre connexion internet.`); setTimeout(()=>setSaveError(null),7000); };
        window.addEventListener("daddy_save_error",h);
        return()=>window.removeEventListener("daddy_save_error",h);
      },[]);

      // Chargement unique des données globales — guard via useRef pour éviter doubles appels async
      const _loadingRef = useRef(false);
      const loadAllCafes = async (force=false) => {
        if (_loadingRef.current) return;            // déjà en cours (guard synchrone)
        if (allCafesLoaded && !force) return;       // déjà chargé
        _loadingRef.current = true;
        setAllCafesLoading(true);
        if (force) { setAllCafesLoaded(false); }
        try {
          const r={};
          await Promise.all(cafes.map(async c=>{
            const [ct,tc,dn,ac,pv,adh,rc]=await Promise.all([
              loadData(c,"caisseta"),loadData(c,"tcam"),loadData(c,"dons"),
              loadData(c,"achats"),loadData(c,"privatisation"),loadData(c,"adhesion"),
              loadData(c,"restocollective")
            ]);
            r[c]={caisseta:ct,tcam:tc,dons:dn,achats:ac,privatisation:pv,adhesion:adh,restocollective:rc};
          }));
          setAllCafesData(r);
          setAllCafesLoaded(true);
        } finally {
          setAllCafesLoading(false);
          _loadingRef.current = false;
        }
      };

      // Charger au premier passage en vue globale (ou retour en vue globale si pas encore chargé)
      useEffect(()=>{
        if(globalView && !allCafesLoaded && !_loadingRef.current) loadAllCafes();
      },[globalView, allCafesLoaded]);

      const isAdmin = session?.role === "admin";
      const isOps   = session?.role === "operations";
      const isMulti = isAdmin || isOps;          // peut naviguer entre tous les cafés
      const activeCafe = isMulti ? (selCafe || cafes[0]) : session?.cafe;
      const rcOn = rcEnabled[activeCafe]||false;
      const TABS = rcOn ? [...TABS_BASE, {id:"restocollective",label:"🍽️ Resto Coll."}] : TABS_BASE;

      useEffect(()=>{ if(session&&!selCafe) setSelCafe(isMulti?cafes[0]:session.cafe); },[session]);

      // Auto-envoi rapports quand l'admin se connecte un lundi ou un 1er du mois
      useEffect(()=>{ if(session) checkAndSendAutoReports(cafes).catch(()=>{}); },[session]);

      const [cafeRefreshTick, setCafeRefreshTick] = useState(0);
      const forceRefreshCafe = () => { setCafeRefreshTick(t=>t+1); };
      useEffect(()=>{
        if(!activeCafe) return;
        setCarteLoaded(false);
        loadData(activeCafe,"carte").then(saved=>{ setCarte(saved&&saved.length>0?saved:DEFAULT_CARTE); setCarteLoaded(true); });
      },[activeCafe, cafeRefreshTick]);

      if(!session) return <LoginScreen onLogin={s=>{
        setSession(s);
        if(s.role==="admin" || s.role==="operations") {
          setGlobalView(true);
          setSubTabAdmin("dashboard"); // toujours Dashboard en arrivant, jamais Administration
          setSelCafe(cafes[0]);
        } else {
          setSelCafe(s.cafe);
        }
      }}/>;

      const cafeColor = getCafeColor(activeCafe||cafes[0], cafes);

      const headerStyle = globalView
        ? { background: `linear-gradient(to right, ${ADMIN_COLOR}, #8B1a1f)` }
        : isAdmin
          ? { background: `linear-gradient(to right, ${ADMIN_COLOR}, #8B1a1f)` }
          : isOps
            ? { background: `linear-gradient(to right, #284351, #3a5f70)` }
            : getCafeHeaderStyle(activeCafe||cafes[0], cafes);

      return (
        <div className="min-h-screen bg-gray-50 font-sans">
          <header style={headerStyle} className="text-white shadow-lg">
            <div className="max-w-5xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <img src={LOGO_SRC} alt="Daddy'Pay" className="h-10 w-auto" style={{filter:"brightness(0) invert(1)"}}/>
                  <div>
                    <h1 className="text-lg font-bold tracking-tight leading-tight">Daddy'Pay</h1>
                    <p className="text-xs opacity-80">La solution Caisse de Chez Daddy</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  {/* Vue globale */}
                  <button onClick={()=>{setGlobalView(v=>!v);setMenuOpen(false);}} className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold transition-colors border ${globalView?"bg-white/30 border-white":"bg-white/15 hover:bg-white/25 border-white/30"}`}>
                    🌐 <span className="hidden sm:inline">{globalView?"Vue café":"Vue globale"}</span>
                  </button>
                  {/* Sélecteur café (admin + opérations, hors vue globale) */}
                  {isMulti&&!globalView&&(
                    <div className="relative">
                      <button onClick={()=>setMenuOpen(m=>!m)} className="flex items-center gap-2 bg-white/20 hover:bg-white/30 backdrop-blur px-3 py-2 rounded-xl text-sm font-semibold transition-colors">
                        <span>{activeCafe}</span><span className="text-xs opacity-70">▼</span>
                      </button>
                      {menuOpen&&(
                        <div className="absolute right-0 top-full mt-2 bg-white rounded-xl shadow-xl border border-gray-100 z-50 min-w-52 overflow-hidden">
                          {cafes.map((c,i)=>(
                            <button key={c} onClick={()=>{setSelCafe(c);setMenuOpen(false);setTab("dashboard");}} className={`w-full text-left px-4 py-2.5 text-sm hover:bg-gray-50 transition-colors flex items-center gap-2 ${c===activeCafe?"font-semibold bg-gray-50":"text-gray-700"}`}>
                              <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor:CAFE_COLORS_LIST[i%CAFE_COLORS_LIST.length]}}></span>{c}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                  {/* Statut Supabase */}
                  <span title={supaStatus===null?"Test connexion…":supaStatus?"Base de données connectée — données partagées entre tous les utilisateurs":"⚠️ Base de données inaccessible — données sauvegardées localement uniquement"}
                    className={`hidden sm:flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-medium border ${supaStatus===null?"bg-white/10 border-white/20 opacity-60":supaStatus?"bg-emerald-500/20 border-emerald-300/40":"bg-rose-500/30 border-rose-300/40"}`}>
                    <span>{supaStatus===null?"⏳":supaStatus?"🟢":"🔴"}</span>
                    <span className="hidden md:inline">{supaStatus===null?"…":supaStatus?"DB":"Hors ligne"}</span>
                  </span>
                  {/* Déconnexion */}
                  {!globalView&&<button onClick={forceRefreshCafe} className="flex items-center gap-1 bg-white/15 hover:bg-white/25 border border-white/30 px-3 py-2 rounded-xl text-sm font-semibold transition-colors" title="Actualiser les données">🔄</button>}
                  <button onClick={()=>{clearSession();setSession(null);setGlobalView(false);setTab("dashboard");}} className="flex items-center gap-1 bg-white/15 hover:bg-white/25 border border-white/30 px-3 py-2 rounded-xl text-sm font-semibold transition-colors">
                    🚪 <span className="hidden sm:inline">Déco.</span>
                  </button>
                </div>
              </div>
              {/* Sous-titre selon rôle */}
              {!isAdmin&&!isOps&&!globalView&&<p className="text-xs opacity-75 mt-1">☕ {session.cafe}</p>}
              {isAdmin&&!globalView&&<p className="text-xs opacity-75 mt-1">👑 Administrateur — {activeCafe}</p>}
              {isOps&&!globalView&&<p className="text-xs opacity-75 mt-1">⚙️ Opérations — {activeCafe}</p>}
              {!globalView&&(
                <nav className="flex gap-1 mt-3 overflow-x-auto pb-1">
                  {TABS.map(t=>(
                    <button key={t.id} onClick={()=>setTab(t.id)} className={`px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap transition-colors ${tab===t.id?"bg-white/90 text-gray-800 shadow-sm":"text-white/80 hover:bg-white/20"}`}>{t.label}</button>
                  ))}
                </nav>
              )}
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 py-6" onClick={()=>menuOpen&&setMenuOpen(false)}>
            {saveError&&(
              <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-rose-600 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 text-sm font-semibold animate-bounce">
                <span>⚠️</span><span>{saveError}</span>
                <button onClick={()=>setSaveError(null)} className="ml-2 opacity-70 hover:opacity-100 text-lg leading-none">✕</button>
              </div>
            )}
            {globalView?(
              <>
                <div className="mb-4 flex items-center gap-2"><span className="inline-block w-3 h-3 rounded-full" style={{backgroundColor:ADMIN_COLOR}}></span><h2 className="text-sm font-semibold text-gray-600">Vue globale — Tous les cafés</h2></div>
                <DashboardGlobal cafes={cafes} onCafeCreated={setCafes} isAdmin={isAdmin} supaStatus={supaStatus} initialSubTab={subTabAdmin} onSubTabChange={setSubTabAdmin} allCafesData={allCafesData} allCafesLoading={allCafesLoading} onForceRefresh={()=>loadAllCafes(true)}/>
              </>
            ):(
              <>
                <div className="mb-4 flex items-center gap-2"><span className="inline-block w-3 h-3 rounded-full" style={{backgroundColor:getCafeDotColor(activeCafe,cafes)}}></span><h2 className="text-sm font-semibold text-gray-600">{activeCafe} — {TABS.find(t=>t.id===tab)?.label}</h2></div>
                {!carteLoaded?<div className="p-8 text-center text-gray-400">Chargement...</div>
                  :tab==="dashboard"     ?<Dashboard cafe={activeCafe} rcOn={rcOn} refreshTick={cafeRefreshTick}/>
                  :tab==="caisseta"      ?<SectionCaisseTA cafe={activeCafe} carte={carte} refreshTick={cafeRefreshTick}/>
                  :tab==="tcam"          ?<SectionTCAM cafe={activeCafe} refreshTick={cafeRefreshTick}/>
                  :tab==="dons"          ?<SectionDons cafe={activeCafe} refreshTick={cafeRefreshTick}/>
                  :tab==="achats"        ?<SectionAchats cafe={activeCafe} refreshTick={cafeRefreshTick}/>
                  :tab==="privatisation" ?<SectionPrivatisation cafe={activeCafe} refreshTick={cafeRefreshTick}/>
                  :tab==="carte"         ?<SectionCarte cafe={activeCafe} carte={carte} setCarte={setCarte}/>
                  :tab==="monnaie"       ?<SectionMonnaie cafe={activeCafe}/>
                  :tab==="adhesion"      ?<SectionAdhesion cafe={activeCafe} refreshTick={cafeRefreshTick}/>
                  :tab==="restocollective"?<SectionRestoCollective cafe={activeCafe} carte={carte} refreshTick={cafeRefreshTick}/>
                  :null
                }
              </>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
